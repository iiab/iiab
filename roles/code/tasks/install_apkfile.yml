- name: Make apk directory
  file:
    path: "{{ code_data_root_apk }}"
    state: directory
    # mode: 0755

### Current release - arm64 ###
- name: Download arch arm 64-bits APK
  command: >
    curl -fL -C -
    --connect-timeout {{ download_timeout | default(60) }}
    --retry 10
    --retry-delay 5
    --retry-all-errors
    --speed-time 30
    --speed-limit 1024
    -o "{{ code_data_root_apk }}/{{ code_apk_64bit_filename }}"
    "{{ code_download_apk_64_redirect }}"
  args:
    creates: "{{ code_data_root_apk }}/{{ code_apk_64bit_filename }}"
  register: apk_download_64
  retries: 5
  delay: 10
  until: apk_download_64 is succeeded

