# Initial "Code on the Go" role to set up "offline" distribution.
# 64-bit support for now, leaving room for future 32-bit support.

# URL & Regular Expressions
code_fetch_apk_url: https://www.appdevforall.org/code-on-the-go
code_download_url: https://appdevforall.org/apk_repo

# Keep vars for 32bit planned
#code_apk_32bit_pattern: latest
code_apk_64bit_pattern: latest

#code_apk_32bit_filename: "CodeOnTheGo-{{ code_apk_32bit_pattern }}.apk"
code_apk_64bit_filename: "CodeOnTheGo-{{ code_apk_64bit_pattern }}.apk"

#code_download_apk_32_redirect: "{{ code_download_url }}/{{ code_apk_32bit_filename }}"
code_download_apk_64_redirect: "{{ code_download_url }}/{{ code_apk_64bit_filename }}"

# Date Scraped
code_play_build_date: "{{ lookup('pipe', 'date -R') }}"

# Root folder path vars
code_serve_path: "{{ content_base }}/www/code"   # /library/www/code
code_data_root: "{{ content_base }}/code"        # /library/code

code_data_root_static: "{{ code_serve_path }}/static"
code_data_root_apk: "{{ code_data_root_static }}/apk"
code_data_root_content: "{{ code_data_root_static }}/content"
