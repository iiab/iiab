- name: Record (initial) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df1

- name: Stop 'anki' systemd service for safety (RED ERROR CAN BE IGNORED!)
  systemd:
    name: anki
    state: stopped
  ignore_errors: True

- name: "Install package: python3-venv"
  package:
    name:
      - python3-venv
    state: present

- name: Create Anki sync data directory {{ anki_home }}
  file:
    path: "{{ anki_home }}"
    state: directory
    owner: "{{ anki_user }}"
    group: "{{ apache_user }}"

- name: Does {{ anki_venv }} exist?
  stat:
    path: "{{ anki_venv }}"
  register: anki_venv_dir

- name: Remove incompatible pre-existing path at {{ anki_venv }}
  file:
    path: "{{ anki_venv }}"
    state: absent
  when: anki_venv_dir.stat.exists and not anki_venv_dir.stat.isdir

- name: "pip install 4 packages into virtual environment: {{ anki_venv }}"
  pip:
    name:
      - pip
      - setuptools
      - wheel
      - "{{ anki_package_spec }}"
    virtualenv: "{{ anki_venv }}"
    virtualenv_command: python3 -m venv "{{ anki_venv }}"
    extra_args: "--no-cache-dir --prefer-binary"

- name: Install /etc/systemd/system/anki.service from template
  template:
    src: anki.service.j2
    dest: /etc/systemd/system/anki.service


# RECORD Anki AS INSTALLED

- name: Record (final) disk space used
  shell: df -B1 --output=used / | tail -1
  register: df2

- name: Add 'anki_disk_usage = {{ df2.stdout | int - df1.stdout | int }}' to {{ iiab_ini_file }}
  ini_file:
    path: "{{ iiab_ini_file }}"    # /etc/iiab/iiab.ini
    section: anki
    option: anki_disk_usage
    value: "{{ df2.stdout | int - df1.stdout | int }}"

- name: "Set 'anki_installed: True'"
  set_fact:
    anki_installed: True

- name: "Add 'anki_installed: True' to {{ iiab_state_file }}"
  lineinfile:
    path: "{{ iiab_state_file }}"    # /etc/iiab/iiab_state.yml
    regexp: '^anki_installed'
    line: 'anki_installed: True'
