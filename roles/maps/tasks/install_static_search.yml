- name: Create static search root directory
  file:
    path: "{{ maps_static_search_root }}"
    state: directory

- name: Install static search js
  copy:
    src: static_search.js
    dest: "{{ maps_static_search_root }}/static_search.js"
    mode: "0644"

- name: "Make sure maps_search_static_db has a valid value"
  assert:
    that: maps_catalog.static_search[maps_search_static_db | string] is defined
    fail_msg: "Error: maps_search_static_db is set to an invalid value. See `\"static_search\"` in https://github.com/iiab/iiab/blob/master/roles/maps/maps-catalog.json for valid values."
    quiet: yes

- name: Download static search database
  include_tasks: download_large_file.yml
  vars:
    dest_base_path: "{{ maps_static_search_root }}"
    item: "{{ maps_catalog.static_search[maps_search_static_db | string] | split('/') | last }}"
    host_url: "{{ (maps_catalog.static_search[maps_search_static_db | string] | split('/'))[:-1] | join('/') }}"
    is_archive: true

- name: Select static database
  file:
    src: "{{ maps_static_search_root }}/{{ maps_catalog.static_search[maps_search_static_db | string] | split('/') | last }}"
    dest: "{{ maps_static_search_root }}/{{ static_search_symlink_name }}"
    state: link
    force: yes
