# TODO - What if the catalog upgrades, but people re-run and don't want to upgrade global data? Maybe stop if they have data, even if it's old? Add a "quick tip" to delete it first, to allow upgrade?

- name: Make serving directory (0755 by default)
  file:
    path: "{{ maps_serve_path }}"
    state: directory
    # mode: 0755

- name: Make index file
  template:
    src: index.html.j2
    dest: "{{ maps_serve_path }}/index.html"

### maps.black ###

- name: Install maps.black.js
  copy:
    src: maps.black.js
    dest: "{{ maps_serve_path }}/maps.black.js"
    mode: "0644"

- name: Download the remaining basic maps.black javascript and styles (0644)
  include_tasks: download_large_file.yml
  vars:
    dest_base_path: "{{ maps_serve_path }}"
  with_items: "{{ maps_dot_black_js_and_styles }}"

- name: "Make sure maps_ne6_zoom has a valid value"
  assert:
    # TODO - fix the zoom level string vs int issue. Remove all the `| string` in this file
    that: maps_catalog.naturalearth6[maps_ne6_zoom | string] is defined
    fail_msg: "Error: maps_ne6_zoom is set to an invalid value. See `\"naturalearth6\"` in https://github.com/iiab/iiab/blob/master/roles/maps/maps-catalog.json for valid values."
    quiet: yes

- name: Download naturalearth6 tiles
  include_tasks: download_large_file.yml
  vars:
    dest_base_path: "{{ maps_serve_path }}"
    item: "{{ maps_catalog.naturalearth6[maps_ne6_zoom | string] }}"

- name: Select naturalearth6 tiles
  file:
    src: "{{ maps_serve_path }}/{{ maps_catalog.naturalearth6[maps_ne6_zoom | string] | split('/') | last }}"
    dest: "{{ maps_serve_path }}/{{ maps_dot_black_naturalearth6_symlink_name }}"
    state: link

- name: "Make sure maps_vector_zoom has a valid value"
  assert:
    that: maps_catalog.vector[maps_vector_zoom | string] is defined
    fail_msg: "Error: maps_vector_zoom is set to an invalid value. See `\"vector\"` in https://github.com/iiab/iiab/blob/master/roles/maps/maps-catalog.json for valid values."
    quiet: yes

- name: Download vector tiles
  include_tasks: download_large_file.yml
  vars:
    dest_base_path: "{{ maps_serve_path }}"
    item: "{{ maps_catalog.vector[maps_vector_zoom | string] }}"

- name: Select vector tiles
  file:
    src: "{{ maps_serve_path }}/{{ maps_catalog.vector[maps_vector_zoom | string] | split('/') | last }}"
    dest: "{{ maps_serve_path }}/{{ maps_dot_black_osm_symlink_name }}"
    state: link

- when: maps_satellite_zoom != "none"
  block:
    - name: "Make sure maps_satellite_zoom has a valid value"
      assert:
        that: maps_catalog.satellite[maps_satellite_zoom | string] is defined
        fail_msg: "Error: maps_satellite_zoom is set to an invalid value. See `\"satellite\"` in https://github.com/iiab/iiab/blob/master/roles/maps/maps-catalog.json for valid values."
        quiet: yes

    - name: Download satellite tiles
      include_tasks: download_large_file.yml
      vars:
        dest_base_path: "{{ maps_serve_path }}"
        item: "{{ maps_catalog.satellite[maps_satellite_zoom | string] }}"

    - name: Select satellite tiles
      file:
        src: "{{ maps_serve_path }}/{{ maps_catalog.satellite[maps_satellite_zoom | string] | split('/') | last }}"
        dest: "{{ maps_serve_path }}/{{ maps_dot_black_satellite_symlink_name }}"
        state: link

- name: Remove unused satellite symlink
  when: maps_satellite_zoom == "none"
  file:
    path: "{{ maps_serve_path }}/{{ maps_dot_black_satellite_symlink_name }}"
    state: absent

- name: "Make sure maps_terrain_zoom has a valid value"
  assert:
    that: maps_catalog.terrain[maps_terrain_zoom | string] is defined
    fail_msg: "Error: maps_terrain_zoom is set to an invalid value. See `\"terrain\"` in https://github.com/iiab/iiab/blob/master/roles/maps/maps-catalog.json for valid values."
    quiet: yes

- name: Download terrain tiles
  include_tasks: download_large_file.yml
  vars:
    dest_base_path: "{{ maps_serve_path }}"
    item: "{{ maps_catalog.terrain[maps_terrain_zoom | string] }}"

# If the user selects "none", we download a dummy file
- name: Select terrain tiles
  file:
    src: "{{ maps_serve_path }}/{{ maps_catalog.terrain[maps_terrain_zoom | string] | split('/') | last }}"
    dest: "{{ maps_serve_path }}/{{ maps_dot_black_terrain_symlink_name }}"
    state: link

- name: Initiate the extracts json
  copy:
    content: '{"regions": {}}'
    dest: "{{ maps_serve_path }}/{{ tile_extract.info_file }}"
    mode: "0644"
    force: false

- name: "Make sure maps_region_downloader is true if maps_preset_full_quality_regions has items"
  assert:
    that: maps_region_downloader or (maps_preset_full_quality_regions | length <= 0)
    fail_msg: "Error: you have maps_preset_full_quality_regions. Either set maps_region_downloader to true or unset maps_preset_full_quality_regions (this will not delete any already downloaded regions)."
    quiet: yes

- name: "Download preset full quality regions"
  # TODO - Is there a safer way to pass in item.name and item.bbox?
  shell: |
    set -euo pipefail
    {{ tile_extract.working_dir }}/tile-extract.py extract {{ item.name }} {{ item.bbox }} noninteractive
  args:
    executable: /bin/bash
  with_items: "{{ maps_preset_full_quality_regions }}"

### maplibre ###

- name: Download maplibre javascript and styles (0644)
  get_url:
    url: "{{ unpkg_url }}/{{ item.url_subpath }}"
    dest: "{{ maps_serve_path }}/{{ item.filename }}"
    checksum: "sha256:{{ item.sha256sum }}"
    mode: "0644"
    timeout: "{{ download_timeout }}"
  with_items: "{{ maplibre_js_and_styles }}"
