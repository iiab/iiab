- name: Assert that "maps_install is sameas true" (boolean not string etc)
  assert:
    that: maps_install is sameas true
    fail_msg: "PLEASE SET 'maps_install: True' e.g. IN: /etc/iiab/local_vars.yml"
    quiet: yes

- name: Assert that "maps_enabled | type_debug == 'bool'" (boolean not string etc)
  assert:
    that: maps_enabled | type_debug == 'bool'
    fail_msg: "PLEASE GIVE VARIABLE 'maps_enabled' A PROPER (UNQUOTED) ANSIBLE BOOLEAN VALUE e.g. IN: /etc/iiab/local_vars.yml"
    quiet: yes


- block:

    - name: "Remove 'maps_installed: True' to {{ iiab_state_file }}"
      lineinfile:
        path: "{{ iiab_state_file }}"    # /etc/iiab/iiab_state.yml
        regexp: '^maps_installed'
        line: 'maps_installed: True'
        state: absent

    - name: Install maps dependencies if 'map_tools_installed' not defined, e.g. in {{ iiab_state_file }}    # /etc/iiab/iiab_state.yml
      include_tasks: install.yml
      when: map_tools_installed is undefined

    - name: Install nominatim if not installed and is defined as maps_search_engine
      include_tasks: install_nominatim.yml
      when: nominatim_installed is undefined and maps_search_engine == "nominatim"

    - include_tasks: install_tile_extract.yml
      when: maps_installed is undefined and maps_region_downloader

    - name: "Add 'maps_installed: True' to {{ iiab_state_file }}"
      lineinfile:
        path: "{{ iiab_state_file }}"    # /etc/iiab/iiab_state.yml
        regexp: '^maps_installed'
        line: 'maps_installed: True'

    # This could go away as there is nothing else using the fact
    # - name: "Set 'maps_installed: True'"
    #   set_fact:
    #     maps_installed: True

    - name: install frontend based on local_vars.yml
      include_tasks: install_frontend.yml

    - name: Enable/Disable/Reload NGINX for maps.black/nominatim
      include_tasks: enable-or-disable.yml

    - name: Add 'maps' variable values to {{ iiab_ini_file }}
      ini_file:
        path: "{{ iiab_ini_file }}"    # /etc/iiab/iiab.ini
        section: maps
        option: "{{ item.option }}"
        value: "{{ item.value | string }}"
      with_items:
        - option: name
          value: Maps
        - option: description
          value: 'OpenStreetMap streets, satellite imagery, and search.'
        - option: maps_install
          value: "{{ maps_install }}"
        - option: maps_enabled
          value: "{{ maps_enabled }}"

  rescue:

    - name: 'SEE ERROR ABOVE (skip_role_on_error: {{ skip_role_on_error }})'
      fail:
        msg: ""
      when: not skip_role_on_error
