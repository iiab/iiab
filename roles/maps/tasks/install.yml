- name: Make maps directory (0755 by default)
  file:
    path: "{{ maps_data_root }}"
    state: directory
    # mode: 0755

- name: Make maps log directory (0755 by default)
  file:
    path: "{{ maps_logs_dir }}"
    state: directory

- name: Install downloading tools
  apt:
    name:
      - aria2
      - python3-xmltodict
      - python3-requests

- name: Download latest map-catalog.json
  get_url:
    url: "{{ maps_catalog_url }}"
    dest: /etc/iiab/maps-catalog.json
    mode: "0644"
    timeout: "{{ download_timeout }}"

- name: Load maps catalog
  include_vars:
    file: /etc/iiab/maps-catalog.json
    name: maps_catalog

- include_tasks: install_tile_extract.yml
  when: maps_region_downloader

- include_tasks: install_frontend.yml

- include_tasks: install_nominatim.yml
  when: maps_search_engine == "nominatim"

- include_tasks: install_static_search.yml
  when: maps_search_engine == "static"

- name: "Set 'maps_installed: True'"
  set_fact:
    maps_installed: True

- name: "Add 'maps_installed: True' to {{ iiab_state_file }}"
  lineinfile:
    path: "{{ iiab_state_file }}"    # /etc/iiab/iiab_state.yml
    regexp: '^maps_installed'
    line: 'maps_installed: True'
