- name: "Make sure archives end in .tar.gz as expected"
  assert:
    that: (not (is_archive | default(false))) or maps_catalog[catalog_item][catalog_item_variant | string][-7:] == ".tar.gz"
    fail_msg: "Error: expect download file name to end in .tar.gz when is_archive=true"
    quiet: yes

- name: "Make sure {{ catalog_item_variant_name }} has a valid value"
  assert:
    that: maps_catalog[catalog_item][catalog_item_variant | string] is defined
    fail_msg: "Error: {{ catalog_item_variant_name }} is set to an invalid value (\"{{ catalog_item_variant }}\"). See `\"{{ catalog_item_variant_name }}\"` in https://github.com/iiab/iiab/blob/master/roles/maps/generate-catalog.py for valid values."
    quiet: yes

- name: "Check if {{ catalog_item }} symlink exists"
  ansible.builtin.stat:
    path: "{{ dest_base_path }}/{{ symlink_name }}"
  register: symlink_stat

- when: not (symlink_stat.stat.islnk is defined and symlink_stat.stat.islnk)
  block:
    - name: "Download {{ catalog_item }} from catalog"
      include_tasks: download_large_file.yml
      vars:
        item: "{{ maps_catalog[catalog_item][catalog_item_variant | string] }}"
   
    - name: "Select {{ catalog_item }}"
      when: not (is_archive | default(false))
      file:
        src: "{{ dest_base_path }}/{{ maps_catalog[catalog_item][catalog_item_variant | string] | split('/') | last }}"
        path: "{{ dest_base_path }}/{{ symlink_name }}"
        state: link
   
    - name: "Select {{ catalog_item }} directory"
      when: is_archive | default(false)
      file:
        src: "{{ dest_base_path }}/{{ maps_catalog[catalog_item][catalog_item_variant | string][:-7] | split('/') | last }}"
        path: "{{ dest_base_path }}/{{ symlink_name }}"
        state: link
