<html>
    <head>
        <script src="maps.black-component.js" type="module"></script>
        <script>
            window.addEventListener("load", () => {
                const mb = document.getElementsByTagName("maps-black")[0];

                // Set the map attributes according to the initial state of
                // the inputs (which seem to survive reloads. which may
                // actually be convenient, so I don't want to unset them on
                // load).
                //
                // Also set map attributes on change of those inputs.

                // For each feature checkbox:
                ["terrain", "globe", "contours", "hillshade"].map(feature => {
                    const checkbox = document.getElementById(feature)

                    // set the map feature according to the initial state of
                    // the checkbox
                    mb[feature] = checkbox.checked

                    // set the map features on checkbox change
                    checkbox.addEventListener('change', function() {
                        mb[feature] = this.checked
                    })
                });

                const styleChooser = document.getElementById("styleswitch")

                // set the mapstyle according to the initial state of the
                // dropdown
                mb.mapstyle = styleChooser.value

                // set the mapstyle on dropdown change
                styleChooser.addEventListener('change', function() {
                    mb.mapstyle = this.value
                })
            });
        </script>
    </head>
    <body>
        <div class="comparisonContainer">
            <maps-black loader="pmtiles" mapstyle="naturalearth-openmaptiles/maputnik/liberty" markers='[{ "lat":0, "lon":0, "html":"Hello Box!" }]'></maps-black>
        </div>
        <div class="styleSelection">
            <label class="styleswitchwrapper">Map style <select class="styleswitch" id="styleswitch">
                <option>naturalearth-openmaptiles/maputnik/liberty</option>
                <option>naturalearth-openmaptiles/cartodb/dark-matter</option>
            </select></label>
            <button class="togglecompare">Compare styles</button>
        </div>
        <div id="set-features">
            <label>3d terrain <input id="terrain" type="checkbox"></label>
            <label>Hillshade <input id="hillshade" type="checkbox"></label>
            <label>Contour lines <input id="contours" type="checkbox"></label>
            <label>Globe <input id="globe" type="checkbox"></label>
        </div>
    </body>
</html>
