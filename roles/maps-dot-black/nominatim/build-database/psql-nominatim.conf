# Recs from here: https://nominatim.org/release-docs/latest/admin/Installation/#tuning-the-postgresql-database

shared_buffers = 2GB
maintenance_work_mem = 10GB # Designed for 128GB per above link. Maybe adjust?
autovacuum_work_mem = 2GB
work_mem = 50MB # Designed for 128GB per above link. Maybe adjust?
synchronous_commit = off
max_wal_size = 1GB
checkpoint_timeout = 60min
checkpoint_completion_target = 0.9
random_page_cost = 1.0
wal_level = minimal
max_wal_senders = 0
